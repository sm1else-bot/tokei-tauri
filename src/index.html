<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokei</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-aurora">
  <div class="app-shell">
    <header class="titlebar" data-tauri-drag-region>
      <div class="brand" data-tauri-drag-region>
        <div class="brand-mark" data-tauri-drag-region></div>
        <div data-tauri-drag-region>
          <strong>Tokei</strong>
          <span>percentual time</span>
        </div>
      </div>
      <nav class="theme-tabs" aria-label="Themes">
        <button data-theme="aurora" class="active">Aurora</button>
        <button data-theme="gaia">Gaia</button>
        <button data-theme="cherry">Cherry</button>
        <button data-theme="canopy">Canopy</button>
      </nav>
      <div class="window-controls">
        <button data-window="minimize">−</button>
        <button data-window="maximize">□</button>
        <button data-window="close">×</button>
      </div>
    </header>

    <main>
      <section class="hero-panel">
        <div>
          <p class="eyebrow">Local time</p>
          <h1 id="clockText">00:00:00</h1>
          <p id="dateText">Loading...</p>
        </div>
        <div class="summary">
          <div>
            <span id="yearDay">Day 0</span>
            <small>of the year</small>
          </div>
        </div>
      </section>

      <section class="grid" id="clockGrid"></section>

      <section class="life-panel hidden" id="lifePanel">
        <div>
          <p class="eyebrow">Life clock</p>
          <h2><span id="lifePercent">0.000%</span> complete</h2>
        </div>
        <input type="range" min="0" max="100" step="0.0001" id="lifeSlider" disabled>
      </section>

      <section class="controls-panel bottom-controls">
        <label class="toggle-row">
          <input type="checkbox" id="lifeToggle">
          <span>Show life clock</span>
          <small>Optional. You can turn it on or off any time.</small>
        </label>
        <button id="editProfile">Edit profile</button>
      </section>
    </main>
  </div>

  <div class="modal" id="onboarding">
    <form class="modal-card" id="profileForm">
      <div class="modal-mark"></div>
      <h2>Set up Tokei</h2>
      <p>This clock is fully local. No data is shared anywhere. Birth date and country are only used for the optional life clock.</p>
      <label>
        Date of birth
        <input type="date" id="dobInput" required>
      </label>
      <label>
        Country
        <select id="countryInput" required></select>
        <small id="countryDataNote">Loading local country data...</small>
      </label>
      <label class="toggle-row modal-toggle">
        <input type="checkbox" id="showLifeInput">
        <span>Show life clock by default</span>
        <small>You can turn it off any time.</small>
      </label>
      <button type="submit">Start the clocks</button>
    </form>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
